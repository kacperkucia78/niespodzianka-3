<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Niespodzianka 💖</title>

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    /* Gradient kolorów miłości */
    background: linear-gradient(135deg, #ff5f6d, #ff66b2, #ff1a75);
    background-size: 400% 400%;
    animation: gradientMove 15s ease infinite;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100vh;
    overflow: hidden;
  }

  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  h1 {
    color: #fff;
    margin-top: 30px;
    text-shadow: 2px 2px 8px #ff1a1a;
  }

  .card {
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 30px;
    margin-top: 50px;
    width: 300px;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(255,0,100,0.5);
  }

  input, button {
    width: 80%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
  }

  input { text-align: center; }

  button {
    background: #ff1a75;
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
  }

  button:hover { background: #ff66b2; }

  #result {
    color: #fff;
    font-size: 18px;
    margin-top: 20px;
    text-shadow: 1px 1px 5px #ff1a1a;
    min-height: 60px;
    white-space: pre-line; /* zachowanie nowych linii */
  }

  #progressContainer {
    width: 80%;
    height: 20px;
    border: 2px solid #fff;
    border-radius: 10px;
    margin: 20px auto;
    display: none;
    overflow: hidden;
  }

  #progressBar {
    height: 100%;
    width: 0%;
    background: #ff1a75;
  }

  /* Serduszka po kliknięciu */
  .heart {
    position: fixed;
    color: #ff1a75;
    font-size: 20px;
    pointer-events: none;
    animation: floatUp 3s ease-out forwards;
    opacity: 0.9;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
  }
</style>
</head>
<body>

<h1>💖 Niespodzianka 💖</h1>

<div class="card">
  <p>Moje imię:</p>
  <input type="text" value="Kacpi <3" disabled>

  <p>Twoje imię:</p>
  <input type="text" id="herName" placeholder="Wpisz swoje imię">

  <button onclick="start()">Sprawdź kompatybilność</button>

  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <div id="result"></div>
</div>

<script>
const myName = "TwojeImię"; // Zmień na swoje

function start() {
  const herName = document.getElementById("herName").value.trim();
  if(!herName) { alert("Wpisz swoje imię 💖"); return; }

  const result = document.getElementById("result");
  const bar = document.getElementById("progressBar");
  const container = document.getElementById("progressContainer");

  container.style.display = "block";
  bar.style.width = "0%";
  result.innerHTML = "";

  explodeHearts(); // serca tylko po kliknięciu

  let width = 0;
  const interval = setInterval(() => {
    width++;
    bar.style.width = width + "%";

    if(width === 30) result.innerHTML = "Analizowanie relacji... 😳";
    if(width === 60) result.innerHTML = "Sprawdzanie chemii... ❤️";
    if(width === 85) result.innerHTML = "Finalizowanie... 💖";

    if(width >= 100) {
      clearInterval(interval);
      explodeHearts(); // drugi wybuch serc
      typeText(`${myName} ❤️ ${herName}\nKompatybilność: 1000000% 💘\nWniosek: To jest coś wyjątkowego 😍`);
    }
  }, 40);
}

// Efekt pisania literka po literce
function typeText(text) {
  const result = document.getElementById("result");
  let i = 0;
  result.innerHTML = "";
  const interval = setInterval(() => {
    result.innerHTML += text.charAt(i);
    i++;
    if(i >= text.length) clearInterval(interval);
  }, 50);
}

// Serduszka lecą tylko po kliknięciu
function explodeHearts() {
  for(let i=0;i<50;i++){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = (window.innerWidth/2) + "px";
    heart.style.top = (window.innerHeight/2) + "px";

    const x = (Math.random()-0.5)*400;
    const y = (Math.random()-0.5)*400;

    heart.style.transform = `translate(${x}px, ${y}px)`;

    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(), 3000);
  }
}
</script>

</body>
</html>
